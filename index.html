const sbVerifyOtp = async (email, token) => {
  const r = await fetch(SUPABASE_URL + "/auth/v1/verify", {
    method: "POST",
    headers: sbHeaders,
    body: JSON.stringify({ type: "email", email: email, token: token }),
  });
  if (!r.ok) return null;
  const d = await r.json();
  return d.access_token ? d : null;
};

  const r = await fetch(SUPABASE_URL + "/rest/v1/profiles?select=*&limit=1", {

  if (!r.ok) return null;
  const d = await r.json();
  return d[0] || null;
};

  return r.ok;
};

  const r = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=refresh_token", {

function computeAchievements(myList) {
  const watched = myList.filter(i => i.status === "finished");
  return ACHIEVEMENT_DEFS.map(def => ({
    ...def,
    unlocked: !!def.check(watched, myList),
  }));
}

function FilmAgeReveal({ age, avgYear, avgBirthYear, onClose }) {
  const [phase, setPhase] = useState("intro");
  const [displayed, setDisplayed] = useState(0);
  const alive = useRef(true);

  useEffect(() => {
    alive.current = true;
    const ids = [];

    // Scramble during intro
    const scrambleId = setInterval(() => {
      if (alive.current) setDisplayed(Math.floor(Math.random() * 99));
    }, 80);
    ids.push(scrambleId);

    // 1.2s → count up
    const t1 = setTimeout(() => {
      clearInterval(scrambleId);
      if (!alive.current) return;
      setPhase("counting");
      const steps = 55;
      let step = 0;
      const countId = setInterval(() => {
        if (!alive.current) { clearInterval(countId); return; }
        step++;
        const eased = 1 - Math.pow(1 - Math.min(step / steps, 1), 3);
        setDisplayed(Math.round(eased * age));
        if (step >= steps) {
          clearInterval(countId);
          if (!alive.current) return;
          setDisplayed(age);
          setPhase("hold");
        }
      }, Math.round(3800 / steps));
      ids.push(countId);
    }, 1200);
    ids.push(t1);

    // 7s → outro (2s hold after number lands at ~5s)
    const t2 = setTimeout(() => { if (alive.current) setPhase("outro"); }, 7000);
    ids.push(t2);

    // 8.5s → close (1.5s fade out)
    const t3 = setTimeout(() => { if (alive.current) onClose(); }, 8500);
    ids.push(t3);

    return () => {
      alive.current = false;
      ids.forEach(id => { clearTimeout(id); clearInterval(id); });
    };
  }, []);

  return (
    <div className={"film-age-overlay film-age-" + phase} onClick={onClose}>
      <div className="film-age-inner" onClick={e => e.stopPropagation()}>
        <p className="film-age-label">your film age</p>
        <div className={"film-age-number film-age-number-" + phase}>{displayed}</div>
        <p className="film-age-sub">
          {phase === "hold" || phase === "outro"
            ? <span>your films' target audience was born around {avgBirthYear}<br /><span style={{fontSize:"10px",opacity:0.6}}>avg release {avgYear} · adjusted for genre audience</span></span>
            : <>&nbsp;</>}
        </p>
        <button className="film-age-skip" onClick={onClose}>skip</button>
      </div>
    </div>
  );
}

function AvatarDisplay({ index, initials }) {
  if (index != null && AVATAR_IMGS[index]) {
    return <img src={AVATAR_IMGS[index]} alt="avatar" style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }} />;
  }
  return <span className="acct-avatar-initials">{initials}</span>;
}

function AvatarPicker({ current, onSelect, onClose }) {
  return (
    <div className="avatar-picker-backdrop" onClick={onClose}>
      <div className="avatar-picker-sheet" onClick={e => e.stopPropagation()}>
        <div className="avatar-picker-header">
          <span className="avatar-picker-title">choose your avatar</span>
          <button className="panel-close" onClick={onClose}>×</button>
        </div>
        <div className="avatar-picker-grid">
          {AVATAR_IMGS.map((src, i) => (
            <button
              key={i}
              className={"avatar-picker-item" + (current === i ? " avatar-picker-item-active" : "")}
              onClick={() => { onSelect(i); onClose(); }}
            >
              <img src={src} alt={"avatar " + i} style={{ width:"100%", height:"100%", objectFit:"cover", display:"block", borderRadius:"50%" }} />
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}


function computeStats(myList) {
  try {
    const all = (myList || []).filter(it => it);
    const watched = all.filter(it => it.status === "finished" || it.status === "ongoing");
    const movies = watched.filter(it => it.kind === "movie" || it.kind === "movies");
    const tv = watched.filter(it => it.kind === "tv");

    const genreCount = {};
    watched.forEach(it => { if (it.genre) genreCount[it.genre] = (genreCount[it.genre] || 0) + 1; });
    const topGenre = Object.entries(genreCount).sort((a, b) => b[1] - a[1])[0]?.[0] || null;

    const dirCount = {};
    watched.forEach(it => { if (it.director) dirCount[it.director] = (dirCount[it.director] || 0) + 1; });
    const topDirector = Object.entries(dirCount).sort((a, b) => b[1] - a[1])[0]?.[0] || null;

    // Film age: for each title (movies + TV), estimate the birth year of its target audience,
    // then average those birth years and see how old that person is today.
    const allTitles = watched.filter(it => it.year && it.year > 1800);
    const birthYears = allTitles.map(it => {
      const targetAge = GENRE_TARGET_AGE[it.genre] || DEFAULT_TARGET_AGE;
      return Number(it.year) - targetAge;
    });

    const avgBirthYear = birthYears.length
      ? Math.round(birthYears.reduce((a, b) => a + b, 0) / birthYears.length)
      : null;
    const filmAge = avgBirthYear ? new Date().getFullYear() - avgBirthYear : null;
    const avgYear = allTitles.length
      ? Math.round(allTitles.reduce((a, b) => a + Number(b.year), 0) / allTitles.length)
      : null;

    return { watched: watched.length, movies: movies.length, tv: tv.length, topGenre, topDirector, filmAge, avgYear, avgBirthYear, totalTitles: allTitles.length };
  } catch (_) {
    return { watched: 0, movies: 0, tv: 0, topGenre: null, topDirector: null, filmAge: null, avgYear: null, avgBirthYear: null };
  }
}

function AccountPanel({ account, onUpdate, myList = [], onBack, language = "en", nickname = "", session, syncing, lastSynced, onSync, onSignIn, onSignOut }) {
  const [email, setEmail] = useState(account.email || "");
  const [phone, setPhone] = useState(account.phone || "");
  const [saved, setSaved] = useState(false);
  const [avatarIndex, setAvatarIndex] = useState(account.avatarIndex != null ? account.avatarIndex : null);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [revealOpen, setRevealOpen] = useState(false);
  const stats = computeStats(myList);

  const save = () => {
    onUpdate({ email, phone, avatarIndex });
    setSaved(true);
    setTimeout(() => setSaved(false), 1800);
  };

  const initials = (account.email || "?").charAt(0).toUpperCase();

  return (
    <div className="acct-page">
      {/* Header */}
      <div className="acct-header">
        <button className="acct-back" onClick={onBack} aria-label="Close">
          <IconBack />
        </button>
        <span className="acct-header-title">{nickname || "profile"}</span>
        <button className="acct-save-btn" onClick={save}>{saved ? "saved v" : "save"}</button>
      </div>

      {/* Avatar */}
      <div className="acct-hero">
        <div className="acct-avatar-wrap" onClick={() => setPickerOpen(true)}>
          <AvatarDisplay index={avatarIndex} initials={initials} />
          <span className="acct-avatar-edit">✎</span>
        </div>
        <p className="acct-avatar-hint">tap to choose avatar</p>
      </div>

      {pickerOpen && (
        <AvatarPicker
          current={avatarIndex}
          onSelect={(i) => { setAvatarIndex(i); onUpdate({ avatarIndex: i }); }}
          onClose={() => setPickerOpen(false)}
        />
      )}

      {/* Stats grid */}
      <div className="acct-stats-section">
        <h3 className="acct-section-label">your stats</h3>
        <div className="acct-stats-grid">
          <div className="acct-stat">
            <span className="acct-stat-value">{stats.movies}</span>
            <span className="acct-stat-label">movies watched</span>
          </div>
          <div className="acct-stat">
            <span className="acct-stat-value">{stats.tv}</span>
            <span className="acct-stat-label">shows watched</span>
          </div>
          <div className="acct-stat acct-stat-wide">
            <span className="acct-stat-value">{stats.watched}</span>
            <span className="acct-stat-label">total watched</span>
          </div>
        </div>
      </div>

      {/* Taste profile */}
      <div className="acct-stats-section">
        <h3 className="acct-section-label">taste profile</h3>
        <div className="acct-taste-list">
          <div className="acct-taste-row">
            <span className="acct-taste-label">top genre</span>
            <span className="acct-taste-value">{stats.topGenre || "-"}</span>
          </div>
          <div className="acct-taste-row">
            <span className="acct-taste-label">top director</span>
            <span className="acct-taste-value acct-taste-director">{stats.topDirector || "-"}</span>
          </div>
          <div className="acct-taste-row">
            <span className="acct-taste-label">film age</span>
            <button
              className={"acct-age-reveal-btn" + (stats.filmAge == null ? " acct-age-reveal-btn-disabled" : "")}
              onClick={() => stats.filmAge != null && setRevealOpen(true)}
              disabled={stats.filmAge == null}
            >
              {stats.filmAge != null ? "reveal your film age" : "watch more films"}
            </button>
          </div>
        </div>
      </div>

      {revealOpen && stats.filmAge != null && (
        <FilmAgeReveal age={stats.filmAge} avgYear={stats.avgYear} avgBirthYear={stats.avgBirthYear} onClose={() => setRevealOpen(false)} />
      )}

      {/* Account fields */}
      <div className="acct-stats-section">
        <h3 className="acct-section-label">account</h3>
        <div className="acct-fields">
          <label className="acct-field">
            <span className="acct-field-label">email</span>
            <input type="email" className="acct-field-input" value={email} placeholder="you@example.com" onChange={e => setEmail(e.target.value)} />
          </label>
          <label className="acct-field">
            <span className="acct-field-label">phone</span>
            <input type="tel" className="acct-field-input" value={phone} placeholder="+1 555 000 0000" onChange={e => setPhone(e.target.value)} />
          </label>
        </div>
      </div>

      {/* Sync section */}
      <div className="acct-stats-section">
        <h3 className="acct-section-label">sync & backup</h3>
        {session ? (
          <div className="acct-sync-box">
            <div className="acct-sync-status">
              <span className={"acct-sync-dot" + (syncing ? " acct-sync-dot-pulse" : " acct-sync-dot-ok")} />
              <span className="acct-sync-label">
                {syncing ? "syncing..." : lastSynced ? "synced " + lastSynced.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) : "not yet synced"}
              </span>
            </div>
            <p className="acct-sync-desc">your list syncs automatically across all your devices.</p>
            <div style={{ display:"flex", gap:8 }}>
              <button className="acct-sync-btn" onClick={onSync} disabled={syncing}>
                {syncing ? "syncing..." : "^ sync now"}
              </button>
              <button className="acct-sync-btn acct-sync-btn-out" onClick={onSignOut}>
                sign out
              </button>
            </div>
          </div>

function decadeOf(year) {
  return Math.floor(year / 10) * 10 + "s";

const POSTER_PALETTES = [
  ["#B85C38", "#7A3B22"], ["#3D6E66", "#244540"], ["#2F5A7D", "#1B3A52"],
  ["#7D4F9E", "#4F2F66"], ["#9E5B2F", "#6B3C1C"], ["#4A6741", "#2D4027"],
  ["#A14E5C", "#6B2E38"], ["#3F7D7A", "#244C4A"], ["#C4762F", "#8A4F1C"],
  ["#5C5A9E", "#39376B"], ["#2F8F6E", "#1C5945"], ["#9E3F5C", "#6B2940"],
  ["#7A6B3D", "#4F4527"], ["#3D5C9E", "#27386B"], ["#8F4F2F", "#5C311C"],
  ["#5A8F3F", "#365927"],
];

function hashString(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = (h * 31 + str.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}

function PosterArt({ title, genre, year, kind }) {
  const colorSeed = hashString((title || "") + "|" + (genre || "") + "|" + year);
  const shapeSeed = hashString((kind || "") + "::" + (title || "") + "::" + year);
  const [c1, c2] = POSTER_PALETTES[colorSeed % POSTER_PALETTES.length];
  const shapeVariant = shapeSeed % 4;
  const initial = (title || "?").trim().charAt(0).toUpperCase();
  const gradId = `pg-${kind || "x"}-${colorSeed}-${shapeSeed}`;

  return (
    <svg viewBox="0 0 100 140" className="poster-art" role="img" aria-label={`Poster art for ${title}`}>
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor={c1} />
          <stop offset="100%" stopColor={c2} />
        </linearGradient>
      </defs>
      <rect width="100" height="140" rx="6" fill={`url(#${gradId})`} />
      {shapeVariant === 0 && <circle cx="50" cy="48" r="30" fill="rgba(255,255,255,0.08)" />}
      {shapeVariant === 1 && <rect x="10" y="20" width="80" height="56" rx="4" fill="rgba(255,255,255,0.07)" />}
      {shapeVariant === 2 && <polygon points="50,14 86,70 14,70" fill="rgba(255,255,255,0.08)" />}
      {shapeVariant === 3 && (
        <>
          <line x1="0" y1="35" x2="100" y2="35" stroke="rgba(255,255,255,0.1)" strokeWidth="10" />
          <line x1="0" y1="60" x2="100" y2="60" stroke="rgba(255,255,255,0.07)" strokeWidth="6" />
        </>
      )}
      <text x="50" y="60" textAnchor="middle" fontFamily="Oswald, sans-serif" fontWeight="600" fontSize="34" fill="rgba(255,255,255,0.92)">{initial}</text>
      <text x="50" y="118" textAnchor="middle" fontFamily="Oswald, sans-serif" fontWeight="500" fontSize="7" fill="rgba(255,255,255,0.75)" textLength="80" lengthAdjust="spacingAndGlyphs">{(title || "").toUpperCase().slice(0, 16)}</text>
      <text x="50" y="128" textAnchor="middle" fontFamily="JetBrains Mono, monospace" fontSize="6" fill="rgba(255,255,255,0.55)">{year}{genre ? ` · ${genre}` : ""}</text>

// Shared across every card on screen, so each title is only ever fetched from TMDB once,
// no matter how many places (list, search, Home rails) render it.
const tmdbPosterCache = new Map();
const tmdbPosterPromises = new Map();

function getCachedOrFetchTmdbPoster(title, year, kind) {
  const key = `${kind}:${title}:${year}`;
  if (tmdbPosterCache.has(key)) {
    return Promise.resolve(tmdbPosterCache.get(key));
  }
  if (tmdbPosterPromises.has(key)) {
    return tmdbPosterPromises.get(key);
  }
  const p = fetchTmdbPoster(title, year, kind).then(url => {
    tmdbPosterCache.set(key, url);
    tmdbPosterPromises.delete(key);
    return url;
  });
  tmdbPosterPromises.set(key, p);
  return p;
}

// Drop-in replacement for PosterArt: shows the generated art immediately, then
// swaps to the real TMDB poster automatically as soon as it's found, with no
// manual action needed. Respects a manually uploaded posterUrl if one is passed.
function PosterThumb({ title, genre, year, kind, posterUrl }) {
  const [resolvedUrl, setResolvedUrl] = useState(() => {
    const key = `${kind}:${title}:${year}`;
    return tmdbPosterCache.get(key) || null;
  });

  useEffect(() => {
    if (posterUrl) return;
    if (!TMDB_API_KEY || !title) return;
    const key = `${kind}:${title}:${year}`;
    if (tmdbPosterCache.has(key)) {
      setResolvedUrl(tmdbPosterCache.get(key));
      return;
    }
    let cancelled = false;
    getCachedOrFetchTmdbPoster(title, year, kind).then(url => {
      if (!cancelled) setResolvedUrl(url);
    });
    return () => { cancelled = true; };
  }, [title, year, kind, posterUrl]);

  const finalUrl = posterUrl || resolvedUrl;
  if (finalUrl) {
    return <img src={finalUrl} alt={`Poster for ${title}`} />;
  }
  return <PosterArt title={title} genre={genre} year={year} kind={kind} />;
}

function resizeImageFile(file, maxWidth, maxHeight, quality) {
  return new Promise((resolve, reject) => {
    if (!file || !file.type.startsWith("image/")) {
      reject(new Error("Please choose an image file."));
      return;
    }
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Could not read that file."));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Could not load that image."));
      img.onload = () => {
        let { width, height } = img;
        const ratio = Math.min(1, maxWidth / width, maxHeight / height);
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

const TMDB_API_KEY = "ac4c66d5465716df2906747bba5b4f5a";
const TMDB_IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

// TMDB genre ID maps — used to translate our genre strings into TMDB with_genres params
const TMDB_MOVIE_GENRE_IDS = {
  "Action": 28, "Adventure": 12, "Animation": 16, "Comedy": 35, "Crime": 80,
  "Documentary": 99, "Drama": 18, "Horror": 27, "Mystery": 9648, "Romance": 10749,
  "Sci-Fi": 878, "Thriller": 53, "Western": 37,
};
const TMDB_TV_GENRE_IDS = {
  "Action": 10759, "Adventure": 10759, "Animation": 16, "Comedy": 35, "Crime": 80,
  "Documentary": 99, "Drama": 18, "Mystery": 9648, "Romance": 10749, "Sci-Fi": 10765,
  "Thriller": 9648,
};

async function fetchTmdbPoster(title, year, kind) {
  if (!TMDB_API_KEY) return null;
  const mediaType = kind === "tv" ? "tv" : "movie";
  const norm = (s) => (s || "").toLowerCase().trim();
  async function search(withYear) {
    const yearParam = withYear && year ? (mediaType === "tv" ? `&first_air_date_year=${year}` : `&year=${year}`) : "";
    const url = `https://api.themoviedb.org/3/search/${mediaType}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(title)}${yearParam}&include_adult=false`;
    const res = await fetch(url);
    if (!res.ok) return [];
    const data = await res.json();
    return data.results || [];
  }
  try {
    let results = await search(true);
    if (!results.length) results = await search(false);
    const match = results.find(r => norm(r.title || r.name) === norm(title)) || results[0];
    if (!match || !match.poster_path) return null;
    return TMDB_IMAGE_BASE + match.poster_path;
  } catch (_) {
    return null;
  }
}

const TMDB_PROFILE_IMAGE_BASE = "https://image.tmdb.org/t/p/w185";

// Unified fetch: one search call to get the TMDB ID, then detail + credits in parallel.
// Returns { poster, overview, runtime, episodes, cast } — all from TMDB's own data.
const tmdbDetailsCache = new Map();

async function fetchTmdbDetails(title, year, kind) {
  if (!TMDB_API_KEY || !title) return null;
  const key = `${kind}:${title}:${year}`;
  if (tmdbDetailsCache.has(key)) return tmdbDetailsCache.get(key);

  const mediaType = kind === "tv" ? "tv" : "movie";

  async function searchTmdb(withYear) {
    const yearParam = withYear && year ? (mediaType === "tv" ? `&first_air_date_year=${year}` : `&year=${year}`) : "";
    const searchUrl = `https://api.themoviedb.org/3/search/${mediaType}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(title)}${yearParam}&include_adult=false`;
    const res = await fetch(searchUrl);
    if (!res.ok) return null;
    const data = await res.json();
    return data.results || [];
  }

  try {
    let results = await searchTmdb(true);
    if (!results || results.length === 0) results = await searchTmdb(false);
    if (!results || results.length === 0) return null;

    const norm = (s) => (s || "").toLowerCase().trim();
    const match =
      results.find(r => norm(r.title || r.name) === norm(title)) ||
      results[0];
    if (!match) return null;

    // Fetch localised detail + credits in parallel
    const [detailRes, creditsRes] = await Promise.all([
      fetch(`https://api.themoviedb.org/3/${mediaType}/${match.id}?api_key=${TMDB_API_KEY}`),
      fetch(`https://api.themoviedb.org/3/${mediaType}/${match.id}/credits?api_key=${TMDB_API_KEY}`),
    ]);

    const detail = detailRes.ok ? await detailRes.json() : {};
    const credits = creditsRes.ok ? await creditsRes.json() : {};

    const overview = detail.overview || null;

    const cast = (credits.cast || []).slice(0, 8).map(m => ({
      name: m.name,
      character: m.character || "",
      photoUrl: m.profile_path ? TMDB_PROFILE_IMAGE_BASE + m.profile_path : null,
    }));

    const result = {
      poster: detail.poster_path ? TMDB_IMAGE_BASE + detail.poster_path : null,
      overview,
      runtime: mediaType === "movie" ? (detail.runtime || null) : null,
      episodes: mediaType === "tv" ? (detail.number_of_episodes || null) : null,
      cast: cast.length > 0 ? cast : null,
    };

    tmdbDetailsCache.set(key, result);
    if (result.poster) tmdbPosterCache.set(key, result.poster);

    return result;
  } catch (_) {
    return null;
  }
}

async function fetchTmdbCast(title, year, kind) {
  const details = await fetchTmdbDetails(title, year, kind);
  return details ? details.cast : null;
}

  const onPointerMove = (e) => {

    drag.current.active = false;
    if (sheetRef.current) sheetRef.current.style.cursor = "";

  return (
    <div className="sheet-backdrop" onClick={onClose}>
      <div
        ref={sheetRef}
        className="sheet filter-sheet"

        const url = `https://api.themoviedb.org/3/search/${mediaType}?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(q)}&include_adult=false`;
        const res = await fetch(url);
        const data = res.ok ? await res.json() : { results: [] };
        let results = (data.results || []).slice(0, 30).map(r => ({
          id: `tmdb-${r.id}`,
          tmdbId: r.id,
          title: r.title || r.name || "Unknown",
          year: parseInt((r.release_date || r.first_air_date || "0").slice(0, 4)) || 0,
          director: "", country: "",
          genre: (() => {
            const map = kind === "tv" ? TMDB_TV_GENRE_IDS : TMDB_MOVIE_GENRE_IDS;
            const found = Object.entries(map).find(([, id]) => (r.genre_ids||[]).includes(id));
            return found ? found[0] : "";
          })(),
          kind,
          poster: r.poster_path ? TMDB_IMAGE_BASE + r.poster_path : null,
          overview: r.overview || "",
        }));
        // Apply genre + decade filters to TMDB results
        if (filters.genre !== "all") results = results.filter(r => r.genre === filters.genre);
        if (filters.decade !== "all") {
          const dec = parseInt(filters.decade);
          if (!isNaN(dec)) results = results.filter(r => r.year >= dec && r.year <= dec + 9);
        }
        setTmdbResults(results.slice(0, 15));
      } catch (_) { setTmdbResults([]); }
      finally { setTmdbSearching(false); }
    }, 400);
    return () => clearTimeout(t);
  }, [query, kind, filters.genre, filters.decade]);

  const q = query.trim().toLowerCase();
  const hasFilter = filters.genre !== "all" || filters.decade !== "all" || filters.director !== "all" || filters.country !== "all";

  const localResults = (pool || []).filter(item => {
    if (q !== "" && !item.title.toLowerCase().includes(q) && !(item.director||"").toLowerCase().includes(q)) return false;
    if (filters.genre !== "all" && item.genre !== filters.genre) return false;
    if (filters.decade !== "all" && decadeOf(item.year) !== filters.decade) return false;
    if (filters.director !== "all" && item.director !== filters.director) return false;
    if (filters.country !== "all" && item.country !== filters.country) return false;
    return true;
  });

  const localTitlesLower = new Set((pool || []).map(it => it.title.toLowerCase()));
  const tmdbExtra = tmdbResults.filter(r => !localTitlesLower.has(r.title.toLowerCase()));

  const handlePress = (item) => {
    if (addedIds[item.id]) {
      onRemove({ title: item.title, kind });
      setAddedIds(prev => { const next = { ...prev }; delete next[item.id]; return next; });
    } else {
      onAdd(item, kind);
      setAddedIds(prev => ({ ...prev, [item.id]: true }));
    }
  };

  const handleTmdbAdd = (result) => {
    onAddToPool({ ...result });
    onAdd(result, kind);
    setAddedIds(prev => ({ ...prev, [result.id]: true }));
  };

  const renderItem = (item, fromTmdb = false) => {
    const added = !!addedIds[item.id];
    return (
      <li key={item.id}>
        <div className="add-search-item" role="button" tabIndex={0}
          onClick={() => onOpenDetail({ ...item })}
          onKeyDown={e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onOpenDetail({ ...item }); } }}>
          <span className="add-search-item-poster">
            {item.poster
              ? <img src={item.poster} alt={item.title} style={{ width:"100%", height:"100%", objectFit:"cover", display:"block" }} />
              : <PosterThumb title={item.title} genre={item.genre} year={item.year} kind={kind} />}
          </span>
          <span className="add-search-item-text">
            <span className="add-search-item-title">{item.title}</span>
            <span className="add-search-item-meta">
              {item.year}{item.genre ? ` · ${item.genre}` : ""}{item.director ? ` · ${item.director}` : ""}
              {fromTmdb && <span className="add-search-tmdb-badge"> · TMDB</span>}
            </span>
          </span>
          <button type="button"
            className={"add-search-item-status" + (added ? " add-search-item-status-added" : "")}
            onClick={e => { e.stopPropagation(); fromTmdb ? (!added && handleTmdbAdd(item)) : handlePress(item); }}
            aria-label={added ? `Remove ${item.title}` : `Add ${item.title}`}>
            {added ? <IconCheck /> : <IconPlus />}
          </button>
        </div>
      </li>
    );
  };

  const isEmpty = q === "" && !hasFilter;
  const hasAnyResults = localResults.length > 0 || tmdbExtra.length > 0 || tmdbSearching;

  return (
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet add-search-sheet" onClick={e => e.stopPropagation()}>
        <div className="panel-header">
          <h2 className="panel-title">{ADD_LABEL[kind] || "add a title"}</h2>
          <button className="panel-close" onClick={onClose} aria-label="Close">×</button>
        </div>

        <div className="add-search-row">
          <div className="add-search-bar">
            <span className="add-search-icon"><IconSearch /></span>
            <input
              ref={inputRef}
              type="text"
              value={query}
              onChange={e => setQuery(e.target.value)}
              placeholder={kind === "tv" ? "search shows & TMDB..." : "search movies & TMDB..."}
            />
          </div>
          <FilterButton onClick={() => setFilterOpen(true)} active={hasFilter} />
          {filterOpen && (
            <FilterSheet pool={pool || []} value={filters} onChange={setFilters} onClose={() => setFilterOpen(false)} language={lang} />
          )}
        </div>

        <div className="add-search-results">
          {isEmpty ? (
            <p className="add-search-empty">type to search your library and TMDB at once</p>
          ) : !hasAnyResults ? (
            <p className="add-search-empty">no results found</p>
          ) : (
            <ul className="add-search-list">
              {localResults.map(item => renderItem(item, false))}
              {q.length >= 2 && (
                tmdbSearching && tmdbExtra.length === 0 ? (
                  <li className="add-search-section-label">searching TMDB...</li>
                ) : tmdbExtra.length > 0 ? (
                  <>
                    {localResults.length > 0 && <li className="add-search-section-label">more from TMDB</li>}
                    {tmdbExtra.map(item => renderItem(item, true))}
                  </>
                ) : null
              )}
            </ul>
          )}
        </div>
      </div>
    </div>
  );
}

// Curated, not live-trending (no API access) — widely recognized mainstream titles from the pool.
const POPULAR_MOVIE_IDS = ["m67", "m112", "m119", "m134", "m136", "m105", "m21", "m94", "m74", "m48"];
const POPULAR_TV_IDS = ["t1", "t8", "t3", "t2", "t4", "t11"];

// Session cache so trending is only fetched once per app load
const trendingCache = {};

async function fetchTmdbTrending(kind) {
  const mediaType = kind === "tv" ? "tv" : "movie";
  if (trendingCache[mediaType]) return trendingCache[mediaType];
  if (!TMDB_API_KEY) return null;
  try {
    const res = await fetch(`https://api.themoviedb.org/3/trending/${mediaType}/week?api_key=${TMDB_API_KEY}`);
    if (!res.ok) return null;
    const data = await res.json();
    const genreMap = kind === "tv" ? TMDB_TV_GENRE_IDS : TMDB_MOVIE_GENRE_IDS;
    const idToGenre = Object.fromEntries(Object.entries(genreMap).map(([name, id]) => [id, name]));
    const results = (data.results || []).slice(0, 12).map(r => ({
      id: `trending-${mediaType}-${r.id}`,
      tmdbId: r.id,
      title: r.title || r.name || "Unknown",
      year: parseInt((r.release_date || r.first_air_date || "0").slice(0, 4)) || 0,
      director: "",
      genre: (r.genre_ids || []).map(id => idToGenre[id]).filter(Boolean)[0] || "",
      country: "",
      kind,
      poster: r.poster_path ? TMDB_IMAGE_BASE + r.poster_path : null,
      overview: r.overview || "",
    }));
    trendingCache[mediaType] = results;
    return results;
  } catch (_) {
    return null;
  }
}

function getPopularMovies() {
  return POPULAR_MOVIE_IDS.map(id => MOVIE_POOL.find(m => m.id === id)).filter(Boolean);
}
function getPopularTv() {
  return POPULAR_TV_IDS.map(id => TV_POOL.find(t => t.id === id)).filter(Boolean);
}

function getRecommendations(myList, limit) {
  const inListTitles = new Set(myList.map(it => it.title.toLowerCase()));
  if (myList.length === 0) {
    // No taste data yet — surface a small original mix from both pools as a starting point.
    return [...MOVIE_POOL.slice(0, 3), ...TV_POOL.slice(0, 3)].filter(it => !inListTitles.has(it.title.toLowerCase()));
  }
  const genreCounts = {};
  const directorCounts = {};
  myList.forEach(it => {
    if (it.genre) genreCounts[it.genre] = (genreCounts[it.genre] || 0) + 1;
    if (it.director) directorCounts[it.director] = (directorCounts[it.director] || 0) + 1;
  });
  const score = (entry) => {
    let s = 0;
    if (entry.genre && genreCounts[entry.genre]) s += genreCounts[entry.genre] * 2;
    if (entry.director && directorCounts[entry.director]) s += directorCounts[entry.director] * 3;
    return s;
  };
  const candidates = [...MOVIE_POOL, ...TV_POOL]
    .filter(entry => !inListTitles.has(entry.title.toLowerCase()))
    .map(entry => ({ entry, s: score(entry) }))
    .filter(x => x.s > 0)
    .sort((a, b) => b.s - a.s)
    .map(x => x.entry);
  return candidates.slice(0, limit);
}

function SubsectionBar({ active, onChange, lang = "en" }) {
  return (
    <div className="subsection-bar" role="tablist" aria-label="Watch status">
      {SUBSECTIONS.map(s => (
        <button
          key={s.id}
          role="tab"
          aria-selected={active === s.id}
          className={"subsection-btn" + (active === s.id ? " active" : "")}
          onClick={() => onChange(s.id)}
        >
          {t(lang, s.id)}
        </button>
      ))}
    </div>
  );
}

function formatRuntime(minutes) {
  if (!minutes) return null;
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function MovieDetailPage({ item, onClose, onSetPoster, onAdd, onRemove, isInList, lang = "en" }) {
  const [uploading, setUploading] = useState(false);
  const [uploadError, setUploadError] = useState("");
  const [tmdbPoster, setTmdbPoster] = useState(null);
  const [tmdbCast, setTmdbCast] = useState(null);
  const [tmdbOverview, setTmdbOverview] = useState(null);
  const [tmdbRuntime, setTmdbRuntime] = useState(null);
  const [tmdbEpisodes, setTmdbEpisodes] = useState(null);
  const [tmdbLoading, setTmdbLoading] = useState(false);
  const fileInputRef = useRef(null);

  useEffect(() => {
    setTmdbPoster(null);
    setTmdbCast(null);
    setTmdbOverview(null);
    setTmdbRuntime(null);
    setTmdbEpisodes(null);
    if (!item) return;
    let cancelled = false;
    setTmdbLoading(true);
    fetchTmdbDetails(item.title, item.year, item.kind).then(details => {
      if (!cancelled && details) {
        if (!item.posterUrl && details.poster) setTmdbPoster(details.poster);
        if (details.cast) setTmdbCast(details.cast);
        if (details.overview) setTmdbOverview(details.overview);
        if (details.runtime) setTmdbRuntime(details.runtime);
        if (details.episodes) setTmdbEpisodes(details.episodes);
        setTmdbLoading(false);
      }
    });
    return () => { cancelled = true; };
  }, [item && item.title, item && item.kind]);

  const scrollRef = useRef(null);
  const dragScroll = useRef({ active: false, startY: 0, startScroll: 0 });
  const onPointerDown = (e) => {
    if (e.target.closest("button,input,select,a")) return;
    dragScroll.current = { active: true, startY: e.clientY, startScroll: scrollRef.current.scrollTop };
    scrollRef.current.style.cursor = "grabbing";
    e.preventDefault();
  };
  const onPointerMove = (e) => {
    if (!dragScroll.current.active) return;
    scrollRef.current.scrollTop = dragScroll.current.startScroll - (e.clientY - dragScroll.current.startY);
  };
  const onPointerUp = () => {
    dragScroll.current.active = false;
    if (scrollRef.current) scrollRef.current.style.cursor = "";
  };

  if (!item) return null;
  const runtimeLabel = item.kind === "tv"
    ? ((tmdbEpisodes || item.episodes) ? `${tmdbEpisodes || item.episodes} ${t(lang, "episodes")}` : null)
    : formatRuntime(tmdbRuntime || item.runtime);

  const handleFileChange = async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setUploadError("");
    setUploading(true);
    try {
      const dataUrl = await resizeImageFile(file, 400, 600, 0.85);
      onSetPoster(item, dataUrl);
    } catch (err) {
      setUploadError(err.message || "Couldn't upload that image.");
    } finally {
      setUploading(false);
    }
  };

  return (
    <div
      className="detail-backdrop"
      ref={scrollRef}
      onClick={onClose}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerLeave={onPointerUp}
    >
      <div className="detail-page" onClick={e => e.stopPropagation()}>
        <button className="detail-back" onClick={onClose} aria-label="Back">
          <IconBack /> {t(lang, "back")}
        </button>

        <div className="detail-hero">
          <div className="detail-hero-poster-wrap">
            <span className="detail-hero-poster">
              {item.posterUrl
                ? <img src={item.posterUrl} alt={`Poster for ${item.title}`} />
                : tmdbPoster
                ? <img src={tmdbPoster} alt={`Poster for ${item.title}`} />
                : <PosterArt title={item.title} genre={item.genre} year={item.year} kind={item.kind} />}
            </span>
            {!item.posterUrl && tmdbPoster && (
              <p className="detail-tmdb-credit">poster via TMDB</p>
            )}
          </div>
          <div className="detail-hero-info">
            <span className="detail-kind">{KIND_LABEL[item.kind] || item.kind}</span>
            <h2 className="detail-title">{item.title}</h2>
            <p className="detail-meta">
              {item.year}{item.genre ? ` · ${item.genre}` : ""}{runtimeLabel ? ` · ${runtimeLabel}` : ""}
            </p>
          </div>
          <button
            type="button"
            className={"detail-list-btn" + (isInList ? " detail-list-btn-remove" : "")}
            onClick={() => isInList ? onRemove(item) : onAdd(item, item.kind)}
          >
            {isInList ? "x remove from list" : "+ add to list"}
          </button>
        </div>

        <div className="detail-section">
          <h3 className="detail-section-label">{t(lang, "director")}</h3>
          <p className="detail-section-body">{item.director || t(lang, "notListed")}</p>
        </div>

        <div className="detail-section">
          <h3 className="detail-section-label">{t(lang, "mainCast")}</h3>
          {tmdbCast && tmdbCast.length > 0 ? (
            <ul className="cast-list">
              {tmdbCast.map((member, i) => (
                <li key={i} className="cast-row">
                  <span className="cast-photo">
                    {member.photoUrl
                      ? <img src={member.photoUrl} alt={member.name} />
                      : <CastAvatar name={member.name} />}
                  </span>
                  <span className="cast-text">
                    <span className="cast-name">{member.name}</span>
                    {member.character && <span className="cast-character">{member.character}</span>}
                  </span>

              ))}

          ) : tmdbLoading ? (

          ) : item.cast && item.cast.length > 0 ? (
            <ul className="cast-list">
              {item.cast.map((name, i) => (
                <li key={i} className="cast-row">
                  <span className="cast-photo"><CastAvatar name={name} /></span>
                  <span className="cast-text">

function HomeRail({ title, entries, onOpenDetail, emptyText, accent, lang = "en" }) {
  const scrollRef = useRef(null);
  const suppressClickRef = useRef(false);
  const drag = useRef({ active: false, startX: 0, startScroll: 0 });
  const setWidthRef = useRef(0);
  const initializedRef = useRef(false);

  const loopEntries = entries.length > 0 ? [...entries, ...entries, ...entries] : [];

  const correctLoop = () => {
    const el = scrollRef.current;
    const setWidth = setWidthRef.current;
    if (!el || !setWidth) return;
    // If we've drifted into the first or third copy, silently jump by exactly
    // one set's width so we land on the equivalent spot in the middle copy.
    if (el.scrollLeft < setWidth * 0.5) {
      el.scrollLeft += setWidth;
    } else if (el.scrollLeft > setWidth * 1.5) {
      el.scrollLeft -= setWidth;
    }
  };

  useEffect(() => {
    const el = scrollRef.current;
    if (!el || entries.length === 0 || initializedRef.current) return;
    // Measure one set's width once cards have rendered, then start in the middle copy.
    const id = requestAnimationFrame(() => {
      const setWidth = el.scrollWidth / 3;
      setWidthRef.current = setWidth;
      el.scrollLeft = setWidth;
      initializedRef.current = true;
    });
    return () => cancelAnimationFrame(id);
  }, [entries.length]);

  const beginDrag = (clientX) => {
    const el = scrollRef.current;
    if (!el) return;
    drag.current = { active: true, startX: clientX, startScroll: el.scrollLeft };
    suppressClickRef.current = false;
  };
  const moveDrag = (clientX) => {
    const el = scrollRef.current;
    if (!el || !drag.current.active) return;
    const dx = clientX - drag.current.startX;
    if (Math.abs(dx) > 6) suppressClickRef.current = true;
    el.scrollLeft = drag.current.startScroll - dx;
    correctLoop();
  };
  const endDrag = () => {
    drag.current.active = false;
    correctLoop();
    // Let the click that follows touchend/mouseup see the flag, then clear it for next time.
    setTimeout(() => { suppressClickRef.current = false; }, 0);
  };

  const onMouseDown = (e) => beginDrag(e.clientX);
  const onMouseMove = (e) => { if (drag.current.active) moveDrag(e.clientX); };
  const onMouseUp = () => endDrag();
  const onMouseLeave = () => { if (drag.current.active) endDrag(); };

  const onTouchStart = (e) => beginDrag(e.touches[0].clientX);
  const onTouchMove = (e) => moveDrag(e.touches[0].clientX);
  const onTouchEnd = () => endDrag();
  const onScroll = () => correctLoop();

  return (
    <div className="home-rail">
      <span className="home-rail-title-box" style={{ background: accent }}>{title}</span>
      {entries.length === 0 ? (
        <p className="home-rail-empty">{emptyText}</p>
      ) : (
        <div
          className="home-rail-scroll"
          ref={scrollRef}
          onScroll={onScroll}
          onMouseDown={onMouseDown}
          onMouseMove={onMouseMove}
          onMouseUp={onMouseUp}
          onMouseLeave={onMouseLeave}
          onTouchStart={onTouchStart}
          onTouchMove={onTouchMove}
          onTouchEnd={onTouchEnd}
        >
          {loopEntries.map((entry, i) => (
            <HomeCard key={`${entry.id}-${i}`} entry={entry} onOpenDetail={onOpenDetail} suppressClickRef={suppressClickRef} />
          ))}
        </div>
      )}
    </div>
  );
}

function HomeScreen({ myList, onOpenDetail, lang = "en" }) {
  const [popularMovies, setPopularMovies] = useState([]);
  const [popularTv, setPopularTv] = useState([]);
  const [recommendations, setRecommendations] = useState([]);

  // Fetch trending on mount
  useEffect(() => {
    fetchTmdbTrending("movie").then(results => { if (results && results.length > 0) setPopularMovies(results); });
    fetchTmdbTrending("tv").then(results => { if (results && results.length > 0) setPopularTv(results); });
  }, []);

  // Re-fetch recommendations whenever myList changes
  useEffect(() => {
    const inList = new Set(myList.map(it => it.title.toLowerCase()));

    // Find top genre from the user's list (null if list is empty)
    const genreCounts = {};
    myList.forEach(it => { if (it.genre) genreCounts[it.genre] = (genreCounts[it.genre] || 0) + 1; });
    const topGenre = Object.entries(genreCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || null;
    const topGenreId = topGenre ? (TMDB_MOVIE_GENRE_IDS[topGenre] || TMDB_TV_GENRE_IDS[topGenre]) : null;

    // Fetch TMDB discover — genre-filtered if we have list data, popular mix otherwise
    const fetchRecs = async () => {
      try {
        const hasTv = myList.some(it => it.kind === "tv");
        const hasMovie = myList.some(it => it.kind === "movies" || it.kind === "movie");
        // Default to movies when list is empty
        const kind = (myList.length > 0 && hasTv && !hasMovie) ? "tv" : "movie";
        const mediaType = kind === "tv" ? "tv" : "movie";
        const genreParam = topGenreId ? `&with_genres=${topGenreId}` : "";
        const url = `https://api.themoviedb.org/3/discover/${mediaType}?api_key=${TMDB_API_KEY}&sort_by=popularity.desc&vote_count.gte=100${genreParam}`;
        const res = await fetch(url);
        if (!res.ok) return;
        const data = await res.json();
        const genreMap = kind === "tv" ? TMDB_TV_GENRE_IDS : TMDB_MOVIE_GENRE_IDS;
        const idToGenre = Object.fromEntries(Object.entries(genreMap).map(([name, id]) => [id, name]));
        const recs = (data.results || [])
          .filter(r => !inList.has((r.title || r.name || "").toLowerCase()))
          .slice(0, 12)
          .map(r => ({
            id: `rec-${mediaType}-${r.id}`,
            tmdbId: r.id,
            title: r.title || r.name || "Unknown",
            year: parseInt((r.release_date || r.first_air_date || "0").slice(0, 4)) || 0,
            genre: (r.genre_ids || []).map(id => idToGenre[id]).filter(Boolean)[0] || "",
            director: "", country: "", kind,
            poster: r.poster_path ? TMDB_IMAGE_BASE + r.poster_path : null,
            overview: r.overview || "",
          }));
        setRecommendations(recs);
      } catch (_) {}
    };
    fetchRecs();
  }, [myList]);

  return (
    <div className="home-screen">
      <HomeRail title={t(lang, "popularMovies")} entries={popularMovies} onOpenDetail={onOpenDetail} emptyText={t(lang, "nothingYet")} accent="var(--accent2)" lang={lang} />
      <HomeRail title={t(lang, "popularTv")} entries={popularTv} onOpenDetail={onOpenDetail} emptyText={t(lang, "nothingYet")} accent="var(--accent2)" lang={lang} />
      <HomeRail
        title={t(lang, "youMightLike")}
        entries={recommendations}
        onOpenDetail={onOpenDetail}
        emptyText={t(lang, "addFewTitles")}
        accent="var(--accent2)"
        lang={lang}
      />
    </div>
  );
}

function TabPlaceholder({ tabId, tabLabel, myList, subsection, genreFilter, decadeFilter, directorFilter, countryFilter, onStatusChange, onRemove, onReorder, onOpenDetail, onUpdateStoppedAt, lang = "en" }) {
  const isWatchTab = tabId === "movies" || tabId === "tv";
  const [dragItem, setDragItem] = useState(null);
  const [dragOverItem, setDragOverItem] = useState(null);

  if (isWatchTab) {
    const items = (myList || []).filter(it => {
      if (it.kind !== tabId || it.status !== subsection) return false;
      if (genreFilter && genreFilter !== "all" && it.genre !== genreFilter) return false;
      if (decadeFilter && decadeFilter !== "all" && decadeOf(it.year) !== decadeFilter) return false;
      if (directorFilter && directorFilter !== "all" && it.director !== directorFilter) return false;
      if (countryFilter && countryFilter !== "all" && it.country !== countryFilter) return false;
      return true;
    });
    if (items.length === 0) {
      return (
        <div className="empty-state">
          <span className="empty-state-icon"><IconFilm /></span>
          <p className="empty-state-text">{t(lang, "yourListEmpty")}</p>
        </div>
      );
    }

    const handleDragStart = (e, item) => {
      setDragItem(item);
      e.dataTransfer.effectAllowed = "move";
    };
    const handleDragOver = (e, item) => {
      e.preventDefault();
      if (!dragItem || dragItem.title === item.title) return;
      setDragOverItem(item);
    };
    const handleDrop = (e, item) => {
      e.preventDefault();
      if (dragItem && dragItem.title !== item.title) {
        onReorder(dragItem, item);
      }
      setDragItem(null);
      setDragOverItem(null);
    };
    const handleDragEnd = () => {
      setDragItem(null);
      setDragOverItem(null);
    };

    return (
      <ul className="mylist">
        {items.map(item => (
          <MyListRow
            key={item.title + item.kind}
            item={item}
            onStatusChange={onStatusChange}
            onRemove={onRemove}
            onOpenDetail={onOpenDetail}
            onUpdateStoppedAt={onUpdateStoppedAt}
            onDragStart={handleDragStart}
            onDragOver={handleDragOver}
            onDrop={handleDrop}
            onDragEnd={handleDragEnd}
            isDragging={dragItem && dragItem.title === item.title}
            isDragOver={dragOverItem && dragOverItem.title === item.title}
            lang={lang}
          />
        ))}
      </ul>
    );
  }
  if (tabId === "home") {
    return <HomeScreen myList={myList || []} onOpenDetail={onOpenDetail} lang={lang} />;
  }
  return (
    <div className="tab-placeholder">
      <p className="tab-placeholder-text">{tabLabel} screen — built next</p>
    </div>
  );
}

function AuthScreen({ onAuth }) {
  const [step, setStep] = useState("email"); // email | otp | waiting
  const [email, setEmail] = useState("");
  const [otp, setOtp] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [animOut, setAnimOut] = useState(false);

  const sendOtp = async () => {
    const e = email.trim().toLowerCase();
    if (!e || !e.includes("@")) { setError("enter a valid email"); return; }
    setLoading(true); setError("");
    try {
      const ok = await sbSignUpEmail(e);
      if (ok) { setStep("waiting"); }
      else { setError("couldn't send email - try again"); }
    } catch { setError("network error - try again"); }
    finally { setLoading(false); }
  };

  const verifyOtp = async () => {
    const code = otp.trim();
    if (code.length < 4) { setError("enter the 6-digit code from your email"); return; }
    setLoading(true); setError("");
    try {
      const session = await sbVerifyOtp(email.trim().toLowerCase(), code);
      if (!session) { setError("wrong code - check your email and try again"); return; }
      // Save session
      try {
        localStorage.setItem("nw_access_token", session.access_token);
        localStorage.setItem("nw_refresh_token", session.refresh_token);
        localStorage.setItem("nw_user_id", session.user.id);
        localStorage.setItem("nw_email", email.trim().toLowerCase());
      } catch {}
      // Load profile from Supabase
      const profile = await sbGetProfile(session.access_token);
      setAnimOut(true);
      setTimeout(() => onAuth(session, profile), 500);
    } catch { setError("network error - try again"); }
    finally { setLoading(false); }
  };

  return (
    <div className={"onboard-wrap" + (animOut ? " onboard-out" : "")}>
      <div className="onboard-card">
        <div className="onboard-logo">
          <div className="onboard-n-wrap"><span className="onboard-n">N</span></div>
          <div className="onboard-logo-text">
            <span className="onboard-ext">EXT</span>
            <span className="onboard-sub">watch</span>
          </div>
        </div>
        <p className="onboard-tagline">sign in to sync your list across devices</p>

        {step === "email" ? (
          <>
            <div className="onboard-field-wrap">
              <label className="onboard-label">your email</label>
              <input
                className={"onboard-input" + (error ? " onboard-input-error" : "")}
                type="email"
                placeholder="you@example.com"
                value={email}
                onChange={e => { setEmail(e.target.value); setError(""); }}
                onKeyDown={e => e.key === "Enter" && sendOtp()}
                autoFocus
              />
              {error && <span className="onboard-error">{error}</span>}
            </div>
            <button className="onboard-cta" onClick={sendOtp} disabled={loading}>
              {loading ? "sending..." : "send magic link"}
            </button>
          </>
        ) : step === "waiting" ? (
          <>
            <div style={{ textAlign:"center", padding:"1rem 0" }}>
              <div style={{ fontSize:40, marginBottom:12 }}>📧</div>
              <p style={{ fontFamily:"var(--sans)", fontSize:14, color:"var(--ink)", marginBottom:8, fontWeight:600 }}>
                Check your email
              </p>
              <p style={{ fontFamily:"var(--sans)", fontSize:12, color:"var(--ink-soft)", lineHeight:1.6, marginBottom:"1.5rem" }}>
                We sent a login link to<br/>
                <strong style={{color:"var(--ink)"}}>{email}</strong><br/><br/>
                Open the link in your email — it will sign you in automatically.<br/>
                <span style={{opacity:0.7}}>Make sure to open it in the same browser.</span>
              </p>
              <button
                onClick={() => { setStep("otp"); }}
                style={{ background:"none", border:"1px solid var(--rule)", borderRadius:8, color:"var(--ink-soft)", fontFamily:"var(--sans)", fontSize:12, cursor:"pointer", padding:"8px 16px", marginBottom:8, display:"block", width:"100%" }}
              >I have a 6-digit code instead</button>
              <button
                onClick={() => { setStep("email"); setError(""); }}
                style={{ background:"none", border:"none", color:"var(--ink-soft)", fontFamily:"var(--sans)", fontSize:12, cursor:"pointer" }}
              >use a different email</button>
            </div>
          </>
        ) : (
          <>
            <p style={{ fontFamily:"var(--sans)", fontSize:12, color:"var(--ink-soft)", marginBottom:"1rem", textAlign:"center", lineHeight:1.5 }}>
              Enter the 6-digit code from your email<br/><strong style={{color:"var(--ink)"}}>{email}</strong>
            </p>
            <div className="onboard-field-wrap">
              <label className="onboard-label">enter code</label>
              <input
                className={"onboard-input" + (error ? " onboard-input-error" : "")}
                type="number"
                placeholder="123456"
                value={otp}
                onChange={e => { setOtp(e.target.value); setError(""); }}
                onKeyDown={e => e.key === "Enter" && verifyOtp()}
                autoFocus
                style={{ letterSpacing:"0.3em", fontSize:22, textAlign:"center" }}
              />
              {error && <span className="onboard-error">{error}</span>}
            </div>
            <button className="onboard-cta" onClick={verifyOtp} disabled={loading}>
              {loading ? "verifying..." : "verify & sign in"}
            </button>
            <button
              onClick={() => { setStep("email"); setOtp(""); setError(""); }}
              style={{ background:"none", border:"none", color:"var(--ink-soft)", fontFamily:"var(--sans)", fontSize:12, cursor:"pointer", marginTop:8 }}
            >&lt; use a different email</button>
          </>
        )}
      </div>
    </div>
  );
}

function OnboardingScreen({ onDone }) {
  const [nickname, setNickname] = useState("");
  const [agreed, setAgreed] = useState(false);
  const [showTerms, setShowTerms] = useState(false);
  const [error, setError] = useState("");
  const [animOut, setAnimOut] = useState(false);

  const submit = () => {
    const name = nickname.trim();
    if (!name) { setError("please enter a nickname"); return; }
    if (name.length < 2) { setError("at least 2 characters"); return; }
    if (!agreed) { setError("please accept the terms to continue"); return; }
    setError("");
    setAnimOut(true);
    setTimeout(() => onDone(name), 600);
  };

  return (
    <div className={"onboard-wrap" + (animOut ? " onboard-out" : "")}>
      {showTerms ? (
        <div className="onboard-terms-sheet">
          <div className="onboard-terms-header">
            <span className="onboard-terms-title">Terms of Use</span>
            <button className="onboard-terms-close" onClick={() => setShowTerms(false)}>✕</button>
          </div>
          <div className="onboard-terms-body">
            <p><strong>1. Personal use</strong><br/>NEXT watch is a personal watchlist app. All data is stored locally on your device.</p>
            <p><strong>2. Content data</strong><br/>Movie and TV information is sourced from The Movie Database (TMDB). We do not claim ownership of any titles or metadata.</p>
            <p><strong>3. Privacy</strong><br/>Your nickname, list, and preferences stay on your device. We do not collect or transmit personal data.</p>
            <p><strong>4. Acceptable use</strong><br/>You agree to use the app for lawful personal purposes only.</p>
            <p><strong>5. Changes</strong><br/>We may update these terms at any time. Continued use of the app constitutes acceptance.</p>
            <p><strong>6. Disclaimer</strong><br/>The app is provided "as is" without warranty of any kind. We are not liable for any loss of data.</p>
          </div>
          <button className="onboard-terms-agree" onClick={() => { setAgreed(true); setShowTerms(false); }}>
            I agree to the terms
          </button>
        </div>
      ) : (
        <div className="onboard-card">
          {/* Logo */}
          <div className="onboard-logo">
            <div className="onboard-n-wrap">
              <span className="onboard-n">N</span>
            </div>
            <div className="onboard-logo-text">
              <span className="onboard-ext">EXT</span>
              <span className="onboard-sub">watch</span>
            </div>
          </div>

          <p className="onboard-tagline">your personal cinema companion</p>

          {/* Nickname input */}
          <div className="onboard-field-wrap">
            <label className="onboard-label">choose a nickname</label>
            <input
              className={"onboard-input" + (error ? " onboard-input-error" : "")}
              type="text"
              placeholder="e.g. moviebuff, cinephile..."
              value={nickname}
              maxLength={20}
              onChange={e => { setNickname(e.target.value); setError(""); }}
              onKeyDown={e => e.key === "Enter" && submit()}
              autoFocus
            />
            {error && <span className="onboard-error">{error}</span>}
          </div>

          {/* Terms checkbox */}
          <button
            className={"onboard-terms-row" + (agreed ? " onboard-terms-checked" : "")}
            onClick={() => { setAgreed(a => !a); setError(""); }}
            type="button"
          >
            <span className="onboard-checkbox">{agreed ? "v" : ""}</span>
            <span className="onboard-terms-text">
              I agree to the{" "}
              <span
                className="onboard-terms-link"
                onClick={e => { e.stopPropagation(); setShowTerms(true); }}
              >
                terms of use
              </span>
            </span>
          </button>

          {/* CTA */}
          <button
            className={"onboard-cta" + (!agreed ? " onboard-cta-disabled" : "")}
            onClick={submit}
          >
            let's go →
          </button>
        </div>
      )}
    </div>
  );
}

function SplashScreen({ onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 3000);
    return () => clearTimeout(t);
  }, []);

  return (
    <div className="splash">
      <div className="splash-logo">
        <div className="splash-n-wrap">
          <span className="splash-n">N</span>
          <span className="splash-n-glow" aria-hidden="true">N</span>
        </div>
        <span className="splash-next">EXT</span>
        <span className="splash-watch">watch</span>
      </div>
      <div className="splash-bar" />

  );
}


class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  componentDidCatch(e, info) { console.error("App crashed:", e, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{ padding: "2rem", color: "#EFE8D8", background: "#1B1A1F", fontFamily: "monospace", fontSize: "13px" }}>
          <p style={{ color: "#E05C5C", marginBottom: "0.5rem" }}>Something went wrong:</p>
          <pre style={{ whiteSpace: "pre-wrap", color: "#9A93A6" }}>{this.state.error.message}</pre>
          <button onClick={() => this.setState({ error: null })} style={{ marginTop: "1rem", padding: "6px 14px", background: "#2F5A7D", color: "#EFE8D8", border: "none", borderRadius: "6px", cursor: "pointer" }}>try again</button>
        </div>
      );
    }
    return this.props.children;
  }
}

function App() {
  const [splash, setSplash] = useState(true);
  const [nickname, setNickname] = useState(() => {
    try { return localStorage.getItem("nw_nickname") || ""; } catch { return ""; }
  });
  const [showOnboard, setShowOnboard] = useState(() => {
    try { return !localStorage.getItem("nw_nickname"); } catch { return true; }
  });
  const [showAuth, setShowAuth] = useState(false);

  // Supabase session
  const [session, setSession] = useState(null);       // { access_token, user }
  const [syncing, setSyncing] = useState(false);
  const [lastSynced, setLastSynced] = useState(null);

  // Handle magic link — Supabase puts access_token in URL hash when link is clicked
  useEffect(() => {
    const hash = window.location.hash;
    if (!hash) return;
    const params = new URLSearchParams(hash.replace(/^#/, ""));
    const accessToken = params.get("access_token");
    const refreshToken = params.get("refresh_token");
    if (!accessToken) return;
    // Clear hash from URL
    window.history.replaceState(null, "", window.location.pathname);
    // Save tokens
    try {
      localStorage.setItem("nw_access_token", accessToken);
      if (refreshToken) localStorage.setItem("nw_refresh_token", refreshToken);
    } catch {}
    // Fetch profile and log in
    sbGetProfile(accessToken).then(profile => {
      const sess = { access_token: accessToken, refresh_token: refreshToken, user: { id: params.get("user_id") || "" } };
      handleAuth(sess, profile);
    }).catch(() => {});
  }, []);
  const syncTimer = useRef(null);

  const applyProfile = (profile) => {
    if (profile.nickname) { setNickname(profile.nickname); setShowOnboard(false); }
    if (profile.my_list && profile.my_list.length) setMyList(profile.my_list);
    if (profile.settings) {
      if (profile.settings.theme) setTheme(profile.settings.theme);
      if (profile.settings.language) setLanguage(profile.settings.language);
      if (profile.settings.account) setAccount(a => ({ ...a, ...profile.settings.account }));
    }
  };

  // Restore session on mount
  useEffect(() => {
    const tryRestore = async () => {
      try {
        const accessToken  = localStorage.getItem("nw_access_token");
        const refreshToken = localStorage.getItem("nw_refresh_token");
        const userId       = localStorage.getItem("nw_user_id");
        if (!accessToken || !userId) return;
        const fresh = await sbRefreshSession(refreshToken);
        if (!fresh) return;
        localStorage.setItem("nw_access_token",  fresh.access_token);
        localStorage.setItem("nw_refresh_token", fresh.refresh_token);
        setSession({ access_token: fresh.access_token, user: { id: userId } });
        const profile = await sbGetProfile(fresh.access_token);
        if (profile) applyProfile(profile);
      } catch {}
    };
    tryRestore();
  }, []);

  // Debounced sync — fires 3s after any list/settings change
  const scheduleSync = () => {
    if (!session) return;
    if (syncTimer.current) clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(() => doSync(), 3000);
  };

  const doSync = async () => {
    if (!session) return;
    setSyncing(true);
    try {
      await sbUpsertProfile(session.access_token, session.user.id, {
        nickname,
        avatar_index: account.avatarIndex != null ? account.avatarIndex : null,
        my_list: myList,
        settings: { theme, language, account: { email: account.email, phone: account.phone, avatarIndex: account.avatarIndex } },
      });
      setLastSynced(new Date());
    } catch {}
    finally { setSyncing(false); }
  };

  const handleAuth = (newSession, profile) => {
    setSession(newSession);
    setShowAuth(false);
    if (profile) {
      applyProfile(profile);
    }
    if (!profile || !profile.nickname) setShowOnboard(true);
  };

  const signOut = () => {
    try { ["nw_access_token","nw_refresh_token","nw_user_id","nw_email"].forEach(k => localStorage.removeItem(k)); } catch {}
    setSession(null);
  };
  const screenRef = useRef(null);
  const screenDrag = useRef({ active: false, startY: 0, startScroll: 0 });
  const screenSuppressClick = useRef(false);

  const onScreenMouseDown = (e) => {
    const el = screenRef.current;
    if (!el) return;
    screenDrag.current = { active: true, startY: e.clientY, startScroll: el.scrollTop };
    screenSuppressClick.current = false;
  };
  const onScreenMouseMove = (e) => {
    const el = screenRef.current;
    if (!el || !screenDrag.current.active) return;
    const dy = e.clientY - screenDrag.current.startY;
    if (Math.abs(dy) > 5) screenSuppressClick.current = true;
    el.scrollTop = screenDrag.current.startScroll - dy;
  };
  const onScreenMouseUp = () => {
    screenDrag.current.active = false;
    setTimeout(() => { screenSuppressClick.current = false; }, 0);
  };
  const onScreenTouchStart = (e) => {
    const el = screenRef.current;
    if (!el) return;
    screenDrag.current = { active: true, startY: e.touches[0].clientY, startScroll: el.scrollTop };
  };
  const onScreenTouchMove = (e) => {
    const el = screenRef.current;
    if (!el || !screenDrag.current.active) return;
    el.scrollTop = screenDrag.current.startScroll - (e.touches[0].clientY - screenDrag.current.startY);
  };
  const onScreenTouchEnd = () => { screenDrag.current.active = false; };
  const [tab, setTab] = useState("home");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [accountOpen, setAccountOpen] = useState(false);
  const [theme, setTheme] = useState("dark");
  const [language, setLanguage] = useState("en");
  const [account, setAccount] = useState({ email: "", phone: "", syncedDevices: 1 });
  const [subsection, setSubsection] = useState("list");
  const [addModalKind, setAddModalKind] = useState(null);
  const [myList, setMyList] = useState([]);
  const [customMovies, setCustomMovies] = useState([]);
  const [customTv, setCustomTv] = useState([]);

  // Sync to Supabase whenever list or settings change
  useEffect(() => { scheduleSync(); }, [myList, nickname, theme, language, account]);

  const handleOnboardDone = (name) => {
    setNickname(name);
    try { localStorage.setItem("nw_nickname", name); } catch {}
    setShowOnboard(false);
  };
  const allMovies = useMemo(() => [...MOVIE_POOL, ...customMovies], [customMovies]);
  const allTv = useMemo(() => [...TV_POOL, ...customTv], [customTv]);
  const [listFilters, setListFilters] = useState({ genre: "all", decade: "all", director: "all", country: "all" });
  const [listFilterOpen, setListFilterOpen] = useState(false);

  const addToMyList = (item, kind) => {
    const normalKind = (kind === "movie") ? "movies" : kind;
    setMyList(prev => {
      const already = prev.some(it => it.title === item.title && (it.kind === normalKind || it.kind === kind));
      if (already) return prev;
      return [...prev, { ...item, kind: normalKind, status: "list", addedAt: Date.now() }];
    });
  };

  const removeFromMyList = (item) => {
    setMyList(prev => prev.filter(it => !(it.title === item.title && it.kind === item.kind)));
  };
  const addToPool = (entry) => {
    if (entry.kind === "tv") {
      setCustomTv(prev => {
        if (prev.some(it => it.id === entry.id)) return prev;
        return [...prev, entry];
      });
    } else {
      setCustomMovies(prev => {
        if (prev.some(it => it.id === entry.id)) return prev;
        return [...prev, entry];
      });
    }
  };
  const reorderMyList = (draggedItem, targetItem) => {
    setMyList(prev => {
      const fromIndex = prev.findIndex(it => it.title === draggedItem.title && it.kind === draggedItem.kind);
      const toIndex = prev.findIndex(it => it.title === targetItem.title && it.kind === targetItem.kind);
      if (fromIndex === -1 || toIndex === -1 || fromIndex === toIndex) return prev;
      const next = [...prev];
      const [moved] = next.splice(fromIndex, 1);
      next.splice(toIndex, 0, moved);
      return next;
    });
  };
  const [confirmDelete, setConfirmDelete] = useState(null);
  const confirmAndRemove = () => {
    if (confirmDelete) removeFromMyList(confirmDelete);
    setConfirmDelete(null);
  };
  const [detailItem, setDetailItem] = useState(null);

  const setPosterForItem = (item, posterUrl) => {
    setMyList(prev => prev.map(it =>
      (it.title === item.title && it.kind === item.kind) ? { ...it, posterUrl } : it
    ));
    setDetailItem(prev => prev && prev.title === item.title && prev.kind === item.kind ? { ...prev, posterUrl } : prev);
  };

  return (
    <ErrorBoundary>
    <div className={"app theme-" + theme}>
      <style>{CSS}</style>
      {splash && <SplashScreen onDone={() => setSplash(false)} />}
      {!splash && showAuth && <AuthScreen onAuth={handleAuth} />}
      {!splash && !showAuth && showOnboard && <OnboardingScreen onDone={handleOnboardDone} />}

      <div className="shell">
        <div className="topbar">
          <button className="user-btn" onClick={() => setAccountOpen(true)} aria-label="Account" style={{ padding:0, overflow:"hidden" }}>
            {account.avatarIndex != null && AVATAR_IMGS[account.avatarIndex]
              ? <img src={AVATAR_IMGS[account.avatarIndex]} alt="avatar" style={{ width:"100%", height:"100%", objectFit:"cover", display:"block", borderRadius:"50%" }} />
              : <IconUser />}
          </button>
          <span className="brand"><span className="brand-n">N</span>EXT watch</span>
          <button className="gear-btn" onClick={() => setSettingsOpen(true)} aria-label="Open settings">
            <IconGear />
          </button>
        </div>

        {(tab === "movies" || tab === "tv") && (
          <SubsectionBar active={subsection} onChange={setSubsection} lang={language} />
        )}
        {tab === "home" && <div className="home-separator" />}

        {(tab === "movies" || tab === "tv") && (() => {
          const tabItems = myList.filter(it => it.kind === tab);
          const hasListFilter = listFilters.genre !== "all" || listFilters.decade !== "all" || listFilters.director !== "all" || listFilters.country !== "all";
          return (
            <div className="list-filterbar">
              <FilterButton onClick={() => setListFilterOpen(true)} active={hasListFilter} />
              {listFilterOpen && (
                <FilterSheet
                  pool={tabItems}
                  value={listFilters}
                  onChange={setListFilters}
                  onClose={() => setListFilterOpen(false)}
                  language={language}
                />
              )}
            </div>
          );
        })()}

        <div
          ref={screenRef}
          className={"screen" + ((tab === "home" || ((tab === "movies" || tab === "tv") && myList.some(it => it.kind === tab && it.status === subsection))) ? " screen-list" : "")}
          onMouseDown={onScreenMouseDown}
          onMouseMove={onScreenMouseMove}
          onMouseUp={onScreenMouseUp}
          onMouseLeave={onScreenMouseUp}
          onTouchStart={onScreenTouchStart}
          onTouchMove={onScreenTouchMove}
          onTouchEnd={onScreenTouchEnd}
        >
          <TabPlaceholder
            tabId={tab}
            tabLabel={TABS.find(t => t.id === tab)?.label}
            myList={myList}
            subsection={subsection}
            genreFilter={listFilters.genre}
            decadeFilter={listFilters.decade}
            directorFilter={listFilters.director}
            countryFilter={listFilters.country}
            onStatusChange={(item, newStatus) => {
              setMyList(prev => prev.map(it =>
                (it.title === item.title && it.kind === item.kind) ? { ...it, status: newStatus } : it
              ));
            }}
            onRemove={setConfirmDelete}
            onReorder={reorderMyList}
            onOpenDetail={setDetailItem}
            onUpdateStoppedAt={(item, time) => {
              setMyList(prev => prev.map(it =>
                (it.title === item.title && it.kind === item.kind) ? { ...it, stoppedAt: time } : it
              ));
            }}
            lang={language}
          />
          {(tab === "movies" || tab === "tv") && (
            <button className="add-fab" aria-label={ADD_LABEL[tab]} onClick={() => setAddModalKind(tab)}>
              <IconPlus />
              <span className="add-fab-tip">{tab === "movies" ? t(language, "addMovie") : t(language, "addTv")}</span>
            </button>
          )}
        </div>

        <nav className="bottombar" aria-label="Primary">
          {TABS.map(tabItem => {
            const Icon = tabItem.icon;
            const active = tab === tabItem.id;
            return (
              <button
                key={tabItem.id}
                className={"bottombar-item" + (active ? " active" : "")}
                onClick={() => setTab(tabItem.id)}
                aria-current={active ? "page" : undefined}
              >
                <Icon />
                <span>{t(language, tabItem.id)}</span>
              </button>
            );
          })}
        </nav>
      </div>

      {accountOpen && (
        <AccountSheet
          account={account}
          onAccount={p => setAccount(a => ({ ...a, ...p }))}
          myList={myList}
          language={language}
          nickname={nickname}
          session={session}
          syncing={syncing}
          lastSynced={lastSynced}
          onSync={doSync}
          onSignIn={() => { setAccountOpen(false); setShowAuth(true); }}
          onSignOut={signOut}
          onClose={() => setAccountOpen(false)}
        />
      )}

      {settingsOpen && (
        <SettingsSheet
          theme={theme}
          onTheme={setTheme}
          account={account}
          onAccount={p => setAccount(a => ({ ...a, ...p }))}
          language={language}
          onLanguage={setLanguage}
          myList={myList}
          onClose={() => setSettingsOpen(false)}
        />
      )}

      {addModalKind && (
        <AddSearchModal kind={addModalKind} onClose={() => setAddModalKind(null)} onAdd={addToMyList} onRemove={removeFromMyList} onOpenDetail={setDetailItem} pool={addModalKind === "tv" ? allTv : allMovies} onAddToPool={addToPool} lang={language} />
      )}

      <ConfirmDeleteModal
        item={confirmDelete}
        onCancel={() => setConfirmDelete(null)}
        onConfirm={confirmAndRemove}
        language={language}
      />

      <MovieDetailPage
        item={detailItem}
        onClose={() => setDetailItem(null)}
        onSetPoster={setPosterForItem}
        onAdd={addToMyList}
        onRemove={(item) => { removeFromMyList(item); setDetailItem(null); }}
        isInList={detailItem ? myList.some(it => it.title === detailItem.title && (it.kind === detailItem.kind || (it.kind === "movies" && detailItem.kind === "movie") || (it.kind === "movie" && detailItem.kind === "movies"))) : false}
        lang={language}
      />
    </div>
    </ErrorBoundary>
  );
}
